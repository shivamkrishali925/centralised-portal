<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centralised Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-start: #f6fbff;
      --bg-end: #eef7ef;
      --text-main: #0f172a;
      --text-soft: #334155;
      --card-bg: rgba(255, 255, 255, 0.8);
      --card-border: rgba(148, 163, 184, 0.28);
      --accent: #0f766e;
      --accent-2: #ea580c;
      --danger: #b91c1c;
      --focus-ring: #14b8a6;
      --shadow: 0 16px 32px rgba(15, 23, 42, 0.11);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Outfit", sans-serif;
      color: var(--text-main);
      background: linear-gradient(140deg, var(--bg-start), var(--bg-end));
      overflow-x: hidden;
    }

    #vanta-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.45;
    }

    .container {
      position: relative;
      z-index: 1;
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 28px 18px 56px;
    }

    .hero {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.9rem, 3.6vw, 3rem);
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 800;
    }

    .subtitle {
      margin: 8px 0 0;
      font-size: 1rem;
      color: var(--text-soft);
      max-width: 760px;
    }

    .panel {
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 14px;
      margin-bottom: 20px;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-wrap {
      flex: 1 1 260px;
      min-width: 240px;
    }

    .search-input,
    .text-input {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      font-size: 0.95rem;
      padding: 11px 12px;
      background: #fff;
      color: var(--text-main);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .search-input:focus,
    .text-input:focus,
    .btn:focus-visible,
    .card:focus-visible {
      border-color: var(--focus-ring);
      box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.2);
      outline: none;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      background: #e2e8f0;
      color: #0f172a;
      transition: transform 0.15s ease, filter 0.2s ease;
    }

    .btn:hover {
      filter: brightness(0.97);
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-danger {
      background: #fee2e2;
      color: var(--danger);
    }

    .cards-wrapper {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 18px;
    }

    .card {
      position: relative;
      min-height: 230px;
      text-decoration: none;
      color: var(--text-main);
      border-radius: 18px;
      border: 1px solid var(--card-border);
      background: var(--card-bg);
      box-shadow: var(--shadow);
      display: flex;
      align-items: stretch;
      overflow: hidden;
      transform-style: preserve-3d;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      border-color: rgba(15, 118, 110, 0.42);
      box-shadow: 0 20px 36px rgba(15, 23, 42, 0.14);
      transform: translateY(-2px);
    }

    .card-content {
      position: relative;
      z-index: 1;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      transform: translateZ(22px);
    }

    .icon {
      width: 46px;
      height: 46px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 0.86rem;
      background: rgba(15, 118, 110, 0.12);
      color: #0f766e;
      border: 1px solid rgba(15, 118, 110, 0.2);
      letter-spacing: 0.3px;
    }

    .card h2 {
      margin: 0;
      font-size: 1.22rem;
      letter-spacing: 0.2px;
      line-height: 1.25;
    }

    .card p {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.45;
      font-size: 0.92rem;
    }

    .url-label {
      margin-top: auto;
      font-size: 0.8rem;
      color: #0f766e;
      word-break: break-word;
      opacity: 0.88;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(36px);
      opacity: 0.34;
      z-index: 0;
      transition: transform 0.4s ease, opacity 0.3s ease;
    }

    .card:hover .blob {
      transform: scale(1.14);
      opacity: 0.54;
    }

    .blob1 {
      width: 120px;
      height: 120px;
      top: -26px;
      right: -24px;
    }

    .blob2 {
      width: 130px;
      height: 130px;
      bottom: -34px;
      left: -26px;
    }

    .c-worksheet .blob1 { background: #2dd4bf; }
    .c-worksheet .blob2 { background: #38bdf8; }
    .c-timetable .blob1 { background: #86efac; }
    .c-timetable .blob2 { background: #60a5fa; }
    .c-social .blob1 { background: #fdba74; }
    .c-social .blob2 { background: #fda4af; }
    .c-office .blob1 { background: #7dd3fc; }
    .c-office .blob2 { background: #67e8f9; }
    .c-misc .blob1 { background: #fde68a; }
    .c-misc .blob2 { background: #fdba74; }
    .c-coming-soon .blob1 { background: #d9f99d; }
    .c-coming-soon .blob2 { background: #a7f3d0; }
    .c-generated .blob1 { background: #99f6e4; }
    .c-generated .blob2 { background: #c4b5fd; }

    .empty-state {
      border: 1px dashed #94a3b8;
      border-radius: 16px;
      padding: 22px;
      color: var(--text-soft);
      background: rgba(255, 255, 255, 0.7);
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: rgba(15, 23, 42, 0.35);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .modal.show {
      display: flex;
    }

    .modal-card {
      width: min(460px, 100%);
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 24px 40px rgba(15, 23, 42, 0.2);
      padding: 18px;
    }

    .modal-title {
      margin: 0 0 6px;
      font-size: 1.25rem;
    }

    .modal-subtitle {
      margin: 0 0 14px;
      color: var(--text-soft);
      font-size: 0.92rem;
    }

    .form-row {
      margin-bottom: 12px;
    }

    .form-label {
      display: block;
      margin-bottom: 5px;
      font-size: 0.87rem;
      font-weight: 600;
      color: #1e293b;
    }

    .card-error {
      min-height: 20px;
      color: var(--danger);
      font-size: 0.88rem;
      margin-top: 4px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    @media (max-width: 720px) {
      .container {
        padding: 18px 12px 40px;
      }

      .panel {
        padding: 12px;
      }

      .btn {
        flex: 1 1 auto;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }

      .card-content {
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div id="vanta-bg" aria-hidden="true"></div>

  <main class="container">
    <section class="hero">
      <div>
        <h1>System Portal</h1>
        <p class="subtitle">Open your tools quickly, search them instantly, and add new cards by pasting a link.</p>
      </div>
    </section>

    <section class="panel" aria-label="Portal Controls">
      <div class="controls">
        <div class="search-wrap">
          <label class="form-label" for="card-search">Search cards</label>
          <input id="card-search" class="search-input" type="search" placeholder="Search by title, link, or description">
        </div>
        <button id="add-card-btn" class="btn btn-primary" type="button">Add New Card</button>
        <button id="reset-cards-btn" class="btn btn-danger" type="button">Reset Added Cards</button>
      </div>
    </section>

    <section id="cards-wrapper" class="cards-wrapper" aria-live="polite"></section>
  </main>

  <div id="card-modal" class="modal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="card-modal-title">
      <h2 id="card-modal-title" class="modal-title">Add New Card</h2>
      <p class="modal-subtitle">Enter a link and title. Style and description are auto-generated and can be adjusted later in code.</p>

      <form id="card-form" novalidate>
        <div class="form-row">
          <label class="form-label" for="card-link-input">Link URL</label>
          <input id="card-link-input" class="text-input" type="text" inputmode="url" autocomplete="url" required placeholder="https://example.com/tool">
        </div>
        <div class="form-row">
          <label class="form-label" for="card-title-input">Card Title</label>
          <input id="card-title-input" class="text-input" type="text" autocomplete="off" required placeholder="Tool Name">
        </div>
        <p id="card-error" class="card-error" role="alert"></p>
        <div class="modal-actions">
          <button id="cancel-card-btn" class="btn" type="button">Cancel</button>
          <button class="btn btn-primary" type="submit">Create Card</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.waves.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>

  <script>
    const STORAGE_KEY = "portalUserCardsV1";
    const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    const seedCards = [
      {
        id: "seed-worksheet",
        title: "Worksheet",
        url: "https://script.google.com/macros/s/AKfycbw9Rp8gisYIQU3VDh-EIuE0IBILJIxm5_JjET_kv_EQgOiM2d-jQf0GTvq9OiJmIJna/exec",
        icon: "WS",
        description: "Access the Faculty Worksheet System for attendance and daily work tracking.",
        styleClass: "c-worksheet",
        createdAt: "seed"
      },
      {
        id: "seed-timetable",
        title: "Timetable",
        url: "https://script.google.com/macros/s/AKfycbzvRLzNvSlHGxIU5-04BqgbosROFUszILzWpGRM4oYFgugrIX7B0jNWaRm1fdUoxcpTnQ/exec",
        icon: "TT",
        description: "Manage schedules and workload with the interactive master timetable.",
        styleClass: "c-timetable",
        createdAt: "seed"
      },
      {
        id: "seed-social",
        title: "Social Media Tracker",
        url: "https://script.google.com/macros/s/AKfycbyKIVo7Z2RhBkC3xIvTMFbJJSvWPvON2YRUo9ksfJdbqrehyW5QVZrquzoMEnBCG7wm/exec",
        icon: "SM",
        description: "Track social media interactions of faculties.",
        styleClass: "c-social",
        createdAt: "seed"
      },
      {
        id: "seed-office",
        title: "Office Work",
        url: "https://onedrive.live.com/personal/a8b34dd0e5ab35bc/_layouts/15/doc.aspx?resid=47d6cfe2-2d4a-4a7c-b2d0-3797bd805b5b&cid=a8b34dd0e5ab35bc",
        icon: "OW",
        description: "Manage official tasks, documents, and administrative workflows in one place.",
        styleClass: "c-office",
        createdAt: "seed"
      },
      {
        id: "seed-feedback",
        title: "Feedback Analyser",
        url: "https://shivamkrishali925.github.io/faculty-feedback-analyser/",
        icon: "FA",
        description: "Review and analyze faculty feedback quickly.",
        styleClass: "c-misc",
        createdAt: "seed"
      },
      {
        id: "seed-coming-soon",
        title: "Faculty Profiling",
        url: "https://script.google.com/macros/s/AKfycbxPcNLh1xLIwDvpm-R7D1jQX-lbzWBrUCQYTAs6dfBjzy4bSM1up-T6EOPGhwIP3x_7Hw/exec",
        icon: "NEW",
        styleClass: "c-coming-soon",
        createdAt: "seed"
      }
    ];

    const cardsWrapper = document.getElementById("cards-wrapper");
    const cardSearch = document.getElementById("card-search");
    const cardModal = document.getElementById("card-modal");
    const addCardBtn = document.getElementById("add-card-btn");
    const resetCardsBtn = document.getElementById("reset-cards-btn");
    const cardForm = document.getElementById("card-form");
    const linkInput = document.getElementById("card-link-input");
    const titleInput = document.getElementById("card-title-input");
    const cardError = document.getElementById("card-error");
    const cancelCardBtn = document.getElementById("cancel-card-btn");

    let userCards = loadUserCards();

    function validateUrl(url) {
      try {
        const parsed = new URL(url);
        return parsed.protocol === "http:" || parsed.protocol === "https:";
      } catch (error) {
        return false;
      }
    }

    function normalizeUrl(url) {
      const trimmed = String(url || "").trim();
      if (!trimmed) return "";
      if (/^https?:\/\//i.test(trimmed)) return trimmed;
      return "https://" + trimmed;
    }

    function loadUserCards() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        return parsed.filter(isValidCard);
      } catch (error) {
        return [];
      }
    }

    function saveUserCards(cards) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
    }

    function isValidCard(card) {
      if (!card || typeof card !== "object") return false;
      const requiredStringFields = ["id", "title", "url", "icon", "description", "styleClass", "createdAt"];
      const allStrings = requiredStringFields.every((key) => typeof card[key] === "string" && card[key].trim() !== "");
      if (!allStrings) return false;
      return validateUrl(card.url);
    }

    function inferCardMeta(url, title) {
      let host = "";
      try {
        host = new URL(url).hostname.toLowerCase();
      } catch (error) {
        host = "";
      }

      const lowerTitle = title.toLowerCase();
      const defaultMeta = {
        icon: "WEB",
        description: "Open this tool from your centralized portal.",
        styleClass: "c-generated"
      };

      if (host.includes("google")) {
        return { icon: "GG", description: "Google-hosted workflow or app.", styleClass: "c-worksheet" };
      }
      if (host.includes("microsoft") || host.includes("onedrive") || host.includes("sharepoint")) {
        return { icon: "MS", description: "Microsoft workspace and document workflow.", styleClass: "c-office" };
      }
      if (host.includes("github")) {
        return { icon: "GH", description: "Code or project workspace on GitHub.", styleClass: "c-misc" };
      }
      if (host.includes("youtube")) {
        return { icon: "YT", description: "Video resource linked from your portal.", styleClass: "c-social" };
      }
      if (lowerTitle.includes("time") || lowerTitle.includes("schedule")) {
        return { icon: "TT", description: "Scheduling or timeline related tool.", styleClass: "c-timetable" };
      }
      if (lowerTitle.includes("office") || lowerTitle.includes("admin")) {
        return { icon: "OW", description: "Office operations and admin workflow.", styleClass: "c-office" };
      }

      return defaultMeta;
    }

    function createCardFromInput(url, title) {
      const normalizedUrl = normalizeUrl(url);
      const normalizedTitle = String(title || "").trim();

      if (!normalizedTitle) {
        return { error: "Please enter a card title." };
      }
      if (!validateUrl(normalizedUrl)) {
        return { error: "Please enter a valid link URL." };
      }

      const meta = inferCardMeta(normalizedUrl, normalizedTitle);
      return {
        id: "user-" + Date.now(),
        title: normalizedTitle,
        url: normalizedUrl,
        icon: meta.icon,
        description: meta.description,
        styleClass: meta.styleClass,
        createdAt: new Date().toISOString()
      };
    }

    function buildCardElement(card) {
      const cardEl = document.createElement("a");
      cardEl.className = "card " + card.styleClass;
      cardEl.href = card.url;
      cardEl.target = "_blank";
      cardEl.rel = "noopener noreferrer";

      const safeTitle = escapeHtml(card.title);
      const safeDescription = escapeHtml(card.description);
      const safeHost = escapeHtml(getHostname(card.url));
      const safeIcon = escapeHtml(card.icon);

      cardEl.innerHTML = [
        '<div class="blob blob1"></div>',
        '<div class="blob blob2"></div>',
        '<div class="card-content">',
        '  <div class="icon">' + safeIcon + "</div>",
        "  <h2>" + safeTitle + "</h2>",
        "  <p>" + safeDescription + "</p>",
        '  <p class="url-label">' + safeHost + "</p>",
        "</div>"
      ].join("");

      return cardEl;
    }

    function renderCards(allCards) {
      const query = cardSearch.value.trim().toLowerCase();
      const filtered = allCards.filter((card) => {
        if (!query) return true;
        const haystack = [card.title, card.url, card.description].join(" ").toLowerCase();
        return haystack.includes(query);
      });

      cardsWrapper.innerHTML = "";

      if (!filtered.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "No cards match your search.";
        cardsWrapper.appendChild(empty);
        return;
      }

      filtered.forEach((card) => cardsWrapper.appendChild(buildCardElement(card)));
      initTilt();
    }

    function getAllCards() {
      return [...seedCards, ...userCards];
    }

    function getHostname(url) {
      try {
        return new URL(url).hostname.replace(/^www\./, "");
      } catch (error) {
        return url;
      }
    }

    function escapeHtml(input) {
      return String(input)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function openModal() {
      cardForm.reset();
      cardError.textContent = "";
      cardModal.classList.add("show");
      cardModal.setAttribute("aria-hidden", "false");
      linkInput.focus();
    }

    function closeModal() {
      cardModal.classList.remove("show");
      cardModal.setAttribute("aria-hidden", "true");
      addCardBtn.focus();
    }

    function initTilt() {
      if (!window.VanillaTilt) return;
      const cards = document.querySelectorAll(".card");
      if (!cards.length) return;

      VanillaTilt.init(cards, {
        max: reducedMotion ? 0 : 6,
        speed: 300,
        glare: !reducedMotion,
        "max-glare": 0.12,
        perspective: 1300
      });
    }

    function initVanta() {
      if (!window.VANTA || !window.VANTA.WAVES || reducedMotion) return;
      VANTA.WAVES({
        el: "#vanta-bg",
        mouseControls: true,
        touchControls: false,
        gyroControls: false,
        minHeight: 200,
        minWidth: 200,
        scale: 1,
        scaleMobile: 1,
        color: 0xcde7e6,
        shininess: 42,
        waveHeight: 12,
        waveSpeed: 0.38,
        zoom: 0.9
      });
    }

    addCardBtn.addEventListener("click", openModal);
    cancelCardBtn.addEventListener("click", closeModal);

    cardModal.addEventListener("click", (event) => {
      if (event.target === cardModal) {
        closeModal();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && cardModal.classList.contains("show")) {
        closeModal();
      }
    });

    cardForm.addEventListener("submit", (event) => {
      event.preventDefault();
      cardError.textContent = "";

      const newCard = createCardFromInput(linkInput.value, titleInput.value);
      if (newCard.error) {
        cardError.textContent = newCard.error;
        return;
      }

      userCards = [...userCards, newCard];
      saveUserCards(userCards);
      renderCards(getAllCards());
      closeModal();
    });

    cardSearch.addEventListener("input", () => {
      renderCards(getAllCards());
    });

    resetCardsBtn.addEventListener("click", () => {
      if (!userCards.length) {
        alert("There are no added cards to reset.");
        return;
      }

      const isConfirmed = confirm("Remove all cards added from this browser?");
      if (!isConfirmed) return;

      userCards = [];
      saveUserCards(userCards);
      renderCards(getAllCards());
    });

    renderCards(getAllCards());
    initVanta();
  </script>
</body>
</html>
